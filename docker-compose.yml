version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile/backend.Dockerfile
    container_name: shopping-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:44531
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - Jwt__Key=${JWT_KEY:-change_me_with_very_long_secret}
      - Jwt__Issuer=ShoppingApi
      - Jwt__Audience=ShoppingClient
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "44531:44531"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile/frontend.Dockerfile
    container_name: shopping-web
    environment:
      - VITE_API_URL=http://localhost:44531
    ports:
      - "3000:80"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: shopping-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-shop}
      - POSTGRES_USER=${POSTGRES_USER:-shop_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shop_password}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
